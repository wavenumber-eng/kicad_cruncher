name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Run Rack suite
        run: uv run --extra test rack run --all
      - name: Build package
        run: uv run --extra test python -m build
      - name: Check package
        run: uv run --extra test twine check dist/*
      - name: Run installed console test
        run: uv run --extra test python tests/support_scripts/install_test.py

