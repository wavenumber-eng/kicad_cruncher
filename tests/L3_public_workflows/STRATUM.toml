name = "Public Workflows"
order = 3
description = "Fixture-backed public CLI workflows using redistributable assets"
enabled = true
concerns = ["cli", "contracts", "release"]

objectives = [
    "Stable public commands run against redistributable KiCad fixtures",
    "Generated outputs have expected schemas or artifact shapes",
    "Workflow tests do not require a private corpus",
    "A copied KiCad Monkey corpus project exercises real KiCad files",
]

[dependencies]
strata = ["L0_public_cli"]
note = "A synthetic minimal KiCad project is the first redistributable workflow fixture."

[[subtests]]
id = "L3_001"
file = "test_L3_001_design_workflow.py"
name = "Design JSON Workflow"
description = "Run the design command against a synthetic KiCad project and validate JSON output"
concerns = ["cli", "contracts", "release"]
test_case_type = "reference"
test_cases = "tmp_path synthetic KiCad project; tests/corpus/kicad/board_svg/input/led_component"

[subtests.code_under_test]
module = "kicad_cruncher.kicad_cruncher_cmd_design"

[subtests.objectives]
design_output = "design writes a KiCad-native JSON artifact"
auto_detect = "design can auto-detect a single .kicad_pro in CWD"
index_policy = "design honors --no-indexes"

[subtests.approach]
subprocess_cli = "Invoke public CLI commands through the current Python environment"

[subtests.test_functions]
test_design_command_generates_project_json = "Generate design JSON from a project input"
test_design_command_uses_copied_kicad_monkey_corpus_project = "Generate design JSON from a copied KiCad Monkey corpus project"
test_design_command_can_auto_detect_single_project = "Generate design JSON by auto-detecting one project"
test_design_command_rejects_pcb_only_input = "Reject PCB-only input for schematic-backed design JSON"
